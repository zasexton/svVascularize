name: Build & Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload built packages to PyPI?"
        required: true
        default: true
        type: boolean
      version_bump:
        description: "Version increment to use when publishing"
        required: true
        default: "patch"
        type: choice
        options:
          - "patch"
          - "minor"
          - "major"

concurrency:
  group: pypi-release-${{ inputs.publish && 'production' || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.version.outputs.current_version }}
      release_version: ${{ steps.version.outputs.release_version }}
      source_sha: ${{ steps.version.outputs.source_sha }}
    steps:
      - name: Require the default branch for publishing
        if: ${{ inputs.publish && github.ref_name != github.event.repository.default_branch }}
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          echo "::error title=Invalid release branch::PyPI releases must run from ${DEFAULT_BRANCH}."
          exit 1

      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.publish && github.event.repository.default_branch || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine build version
        id: version
        shell: bash
        env:
          PUBLISH: ${{ inputs.publish }}
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          set -euo pipefail
          current_version=$(python .github/scripts/release_version.py current)
          release_version=$current_version
          if [[ "$PUBLISH" == "true" ]]; then
            release_version=$(python .github/scripts/release_version.py next --bump "$VERSION_BUMP")
          fi
          source_sha=$(git rev-parse HEAD)
          {
            echo "current_version=$current_version"
            echo "release_version=$release_version"
            echo "source_sha=$source_sha"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### Package build"
            echo "- Source commit: \`$source_sha\`"
            echo "- Source version: \`$current_version\`"
            echo "- Build version: \`$release_version\`"
            echo "- Publish: \`$PUBLISH\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build_wheels_base:
    needs: prepare_release
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]
    env:
      # Base `svv` wheel: build once per platform (tagged py3-none-<plat>)
      CIBW_BUILD: "cp39-*"
      CIBW_ARCHS_LINUX: "x86_64 aarch64"
      CIBW_ARCHS_MACOS: "universal2"
      CIBW_ARCHS_WINDOWS: "AMD64"
      CIBW_BUILD_VERBOSITY: 3
      # Ensure a broad Linux compatibility baseline (glibc 2.17)
      CIBW_MANYLINUX_X86_64: "manylinux2014"
      CIBW_MANYLINUX_AARCH64: "manylinux2014"
      # Build MMG + svZeroDSolver into the package layout before wheel build
      CIBW_BEFORE_BUILD_LINUX: "python -m pip install -U pip setuptools wheel cmake && python .github/scripts/build_mmg.py --version 5.8.0 --jobs 2 && python .github/scripts/build_0d.py --version 3.0 --jobs 2"
      CIBW_BEFORE_BUILD_MACOS: "python -m pip install -U pip setuptools wheel cmake && python .github/scripts/build_mmg.py --version 5.8.0 --arch universal2 --jobs 2 && python .github/scripts/build_0d.py --version 3.0 --arch universal2 --jobs 2"
      CIBW_BEFORE_BUILD_WINDOWS: "python -m pip install -U pip setuptools wheel cmake && python .github/scripts/build_mmg.py --version 5.8.0 --arch x86_64 --jobs 2 && python .github/scripts/build_0d.py --version 3.0 --arch x86_64 --jobs 2"
      # Enforce that expected executables exist at wheel-build time
      CIBW_ENVIRONMENT_LINUX: "PIP_NO_CACHE_DIR=1 SVV_REQUIRE_MMG=1 SVV_REQUIRE_SOLVER_0D=1"
      CIBW_ENVIRONMENT_WINDOWS: "PIP_NO_CACHE_DIR=1 SVV_REQUIRE_MMG=1 SVV_REQUIRE_SOLVER_0D=1"
      CIBW_ENVIRONMENT_MACOS: "PIP_NO_CACHE_DIR=1 SVV_REQUIRE_MMG=1 SVV_REQUIRE_SOLVER_0D=1 SVV_MMG_ARCH=universal2 SVV_SOLVER_0D_ARCH=universal2 MACOSX_DEPLOYMENT_TARGET=11.0"

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set package version
        env:
          CURRENT_VERSION: ${{ needs.prepare_release.outputs.current_version }}
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
        run: >-
          python .github/scripts/release_version.py set
          --expected-current "$CURRENT_VERSION"
          --version "$RELEASE_VERSION"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip && python -m pip install cibuildwheel

      - name: Set up QEMU (Linux only)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels (svv)
        run: cibuildwheel --output-dir dist

      - name: Validate built wheel(s) (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install -U pip
          wheel=$(ls dist/svv-*.whl | head -n 1)
          python -m pip install --no-deps "$wheel"
          python - <<'PY'
          import os
          import subprocess
          import tempfile

          os.chdir(tempfile.mkdtemp(prefix="svv-wheel-validate-"))

          from svv.utils.remeshing.mmg import get_mmg_exe
          from svv.utils.solvers.solver_0d import get_solver_0d_exe

          exe = get_mmg_exe("mmgs")
          print("MMG selected:", exe)
          # MMG may return non-zero for help/usage; only validate it executes.
          proc = subprocess.run(
            [str(exe), "-h"],
            stdout=subprocess.DEVNULL,
            stderr=subprocess.DEVNULL,
            timeout=10,
            check=False,
          )
          print("mmgs -h exit:", proc.returncode)

          solver_0d = get_solver_0d_exe()
          print("0D solver selected:", solver_0d)
          proc = subprocess.run(
            [str(solver_0d), "-h"],
            stdout=subprocess.DEVNULL,
            stderr=subprocess.DEVNULL,
            timeout=10,
            check=False,
          )
          print("svzerodsolver -h exit:", proc.returncode)
          PY

      - name: Set up Python 3.9 for release smoke test (macOS)
        if: runner.os == 'macOS'
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Run release smoke test in fresh Python 3.9 env (macOS)
        if: runner.os == 'macOS'
        run: bash .github/scripts/release_smoke_macos_py39.sh

      - name: Validate built wheel(s) (Windows)
        if: runner.os == 'Windows'
        run: |
          set -euo pipefail
          python -m venv .venv
          source .venv/Scripts/activate
          python -m pip install -U pip
          wheel=$(ls dist/svv-*win_amd64.whl | head -n 1)
          python -m pip install --no-deps "$wheel"
          python - <<'PY'
          import os
          import subprocess
          import tempfile

          os.chdir(tempfile.mkdtemp(prefix="svv-wheel-validate-"))

          from svv.utils.remeshing.mmg import get_mmg_exe
          from svv.utils.solvers.solver_0d import get_solver_0d_exe

          exe = get_mmg_exe("mmgs")
          print("MMG selected:", exe)
          proc = subprocess.run(
            [str(exe), "-h"],
            stdout=subprocess.DEVNULL,
            stderr=subprocess.DEVNULL,
            timeout=10,
            check=False,
          )
          print("mmgs -h exit:", proc.returncode)

          solver_0d = get_solver_0d_exe()
          print("0D solver selected:", solver_0d)
          proc = subprocess.run(
            [str(solver_0d), "-h"],
            stdout=subprocess.DEVNULL,
            stderr=subprocess.DEVNULL,
            timeout=10,
            check=False,
          )
          print("svzerodsolver -h exit:", proc.returncode)
          PY

      - name: Validate built wheel(s) (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          ls -la dist
          for wheel in dist/svv-*linux*.whl; do
            python .github/scripts/validate_linux_wheel.py "$wheel"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-base-${{ matrix.os }}
          path: dist

  build_wheels_accelerated:
    needs: prepare_release
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    env:
      CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
      CIBW_ARCHS_LINUX: "x86_64 aarch64"
      CIBW_ARCHS_MACOS: "universal2"
      CIBW_ARCHS_WINDOWS: "AMD64"
      CIBW_BUILD_VERBOSITY: 3
      # Install build deps before building each wheel (use python -m pip for Windows compatibility)
      CIBW_BEFORE_BUILD: "python -m pip install -U pip setuptools wheel cython numpy cmake"
      # Tell setup.py to build the companion 'svv-accelerated' distribution
      CIBW_ENVIRONMENT: "PIP_NO_CACHE_DIR=1 SVV_ACCEL_COMPANION=1"

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set package version
        env:
          CURRENT_VERSION: ${{ needs.prepare_release.outputs.current_version }}
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
        run: >-
          python .github/scripts/release_version.py set
          --expected-current "$CURRENT_VERSION"
          --version "$RELEASE_VERSION"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip && pip install cibuildwheel

      - name: Set up QEMU (Linux only)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels (svv-accelerated)
        run: cibuildwheel --output-dir dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-accelerated-${{ matrix.os }}
          path: dist

  build_sdist:
    needs: prepare_release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.source_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set package version
        env:
          CURRENT_VERSION: ${{ needs.prepare_release.outputs.current_version }}
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
        run: >-
          python .github/scripts/release_version.py set
          --expected-current "$CURRENT_VERSION"
          --version "$RELEASE_VERSION"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip && pip install build

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    if: ${{ inputs.publish }}
    needs: [prepare_release, build_wheels_base, build_wheels_accelerated, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.source_sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          # download all artifacts from previous jobs (base wheels, sdist, accelerated wheels)
          pattern: '*'
          path: dist
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine

      - name: Validate release artifacts
        env:
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
        run: >-
          python .github/scripts/release_version.py verify-dist
          --dist dist
          --version "$RELEASE_VERSION"

      - name: Validate PyPI credentials
        env:
          PYPI_PASSWORD_SVV: ${{ secrets.PYPI_PASSWORD_SVV }}
          PYPI_PASSWORD_ACCEL: ${{ secrets.PYPI_PASSWORD_ACCEL }}
        run: |
          set -euo pipefail
          if [[ -z "$PYPI_PASSWORD_SVV" ]]; then
            echo "::error title=Missing secret::The repository secret 'PYPI_PASSWORD_SVV' is not configured."
            exit 1
          fi
          if [[ -z "$PYPI_PASSWORD_ACCEL" ]]; then
            echo "::error title=Missing secret::The repository secret 'PYPI_PASSWORD_ACCEL' is not configured."
            exit 1
          fi

      - name: Confirm release source is current
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          SOURCE_SHA: ${{ needs.prepare_release.outputs.source_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          remote_sha=$(git rev-parse "refs/remotes/origin/${DEFAULT_BRANCH}")
          if [[ "$remote_sha" != "$SOURCE_SHA" ]]; then
            echo "::error title=Release source changed::${DEFAULT_BRANCH} advanced from ${SOURCE_SHA} to ${remote_sha} while artifacts were building. Run the workflow again."
            exit 1
          fi

      - name: Upload base package (svv) to PyPI
        run: |
          set -euo pipefail
          mapfile -t files < <(
            find dist -maxdepth 1 -type f \
              \( -name 'svv-*.whl' -o -name 'svv-*.tar.gz' \) \
              ! -name 'svv-accelerated-*' \
              ! -name 'svv_accelerated-*' \
              -print | sort
          )
          if (( ${#files[@]} == 0 )); then
            echo "::error title=Missing artifacts::No base svv artifacts were found."
            exit 1
          fi
          python -m twine upload \
            --non-interactive \
            --skip-existing \
            --verbose \
            --repository pypi \
            "${files[@]}"
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD_SVV }}

      - name: Upload accelerated wheels (svv-accelerated) to PyPI
        run: |
          set -euo pipefail
          mapfile -t files < <(
            find dist -maxdepth 1 -type f \
              \( -name 'svv_accelerated-*.whl' -o -name 'svv-accelerated-*.whl' \) \
              -print | sort
          )
          if (( ${#files[@]} == 0 )); then
            echo "::error title=Missing artifacts::No svv-accelerated artifacts were found."
            exit 1
          fi
          python -m twine upload \
            --non-interactive \
            --skip-existing \
            --verbose \
            --repository pypi \
            "${files[@]}"
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD_ACCEL }}

      - name: Verify published artifacts
        env:
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
        run: >-
          python .github/scripts/release_version.py verify-pypi
          --dist dist
          --version "$RELEASE_VERSION"

      - name: Record published version
        id: version_commit
        env:
          CURRENT_VERSION: ${{ needs.prepare_release.outputs.current_version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.release_version }}
          SOURCE_SHA: ${{ needs.prepare_release.outputs.source_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          remote_sha=$(git rev-parse "refs/remotes/origin/${DEFAULT_BRANCH}")
          if [[ "$remote_sha" != "$SOURCE_SHA" ]]; then
            echo "::error title=Version commit blocked::${DEFAULT_BRANCH} changed after the upload completed. The published files are intact; reconcile ${DEFAULT_BRANCH} with version ${RELEASE_VERSION} before starting another release."
            exit 1
          fi
          python .github/scripts/release_version.py set \
            --expected-current "$CURRENT_VERSION" \
            --version "$RELEASE_VERSION"
          git diff --check -- svv/__init__.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add svv/__init__.py
          git commit -m "chore: bump version to ${RELEASE_VERSION}"
          commit_sha=$(git rev-parse HEAD)
          git push origin "HEAD:refs/heads/${DEFAULT_BRANCH}"
          echo "sha=$commit_sha" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.release_version }}
          name: svv ${{ needs.prepare_release.outputs.release_version }}
          target_commitish: ${{ steps.version_commit.outputs.sha }}
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist/svv-*.whl
            dist/svv-*.tar.gz
            dist/svv_accelerated-*.whl
            dist/svv-accelerated-*.whl
